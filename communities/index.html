<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Communities | Learning Sources Hub</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="theme-light page-communities" data-page="communities" data-base="../">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <header class="topbar">
    <a class="topbar__brand" href="../" aria-label="Learning Sources Hub home">
      <span class="brand-mark">LS</span>
      <div class="brand-copy">
        <h1>Learning Sources Hub</h1>
      </div>
    </a>

    <nav class="topbar__nav" aria-label="Primary">
      <div class="topbar__links">
        <a class="topbar__link" href="../resources/">Resources</a>
        <a class="topbar__link" href="../platforms/">Platforms</a>
        <a class="topbar__link is-active" href="../communities/" aria-current="page">Communities</a>
      </div>
      <button class="theme-switch" id="themeToggle" type="button" aria-pressed="false" aria-label="Toggle theme">
        <span class="theme-switch__option theme-switch__option--sun" aria-hidden="true">
          <svg class="theme-switch__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v3"></path>
            <path d="M12 19v3"></path>
            <path d="m4.93 4.93 2.12 2.12"></path>
            <path d="m16.95 16.95 2.12 2.12"></path>
            <path d="M2 12h3"></path>
            <path d="M19 12h3"></path>
            <path d="m4.93 19.07 2.12-2.12"></path>
            <path d="m16.95 7.05 2.12-2.12"></path>
          </svg>
        </span>
        <span class="theme-switch__option theme-switch__option--moon" aria-hidden="true">
          <svg class="theme-switch__icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 13.2A8.7 8.7 0 0 1 10.8 3 9.5 9.5 0 1 0 21 13.2Z"></path>
          </svg>
        </span>
        <span class="theme-switch__label sr-only" id="themeLabel">Light</span>
      </button>
      <button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="navDrawer">
        <span></span>
        <span></span>
        <span></span>
        <span class="sr-only">Open menu</span>
      </button>
    </nav>
  </header>

  <div class="drawer-overlay" id="drawerOverlay" hidden></div>
  <aside class="drawer" id="navDrawer" aria-label="Mobile navigation" aria-hidden="true">
    <div class="drawer__head">
      <strong>Menu</strong>
      <button class="drawer__close" id="drawerClose" type="button">Close</button>
    </div>
    <div class="drawer-section">
      <div class="drawer-nav">
        <a href="../resources/">Resources</a>
        <a href="../platforms/">Platforms</a>
        <a href="../communities/" aria-current="page">Communities</a>
      </div>
      <label class="search search--compact">
        <span class="sr-only">Search communities</span>
        <input id="drawerSearchInput" type="search" placeholder="Search communities" />
      </label>
      <label class="search search--compact">
        <span class="sr-only">Filter by category</span>
        <select id="drawerCategoryFilter">
          <option value="all">All categories</option>
        </select>
      </label>
      <div class="drawer-categories">
        <p class="drawer-categories__title">Categories</p>
        <div id="drawerCategoryLinks"></div>
      </div>
    </div>
    <button class="theme-switch theme-switch--drawer" id="drawerThemeToggle" type="button" aria-pressed="false" aria-label="Toggle theme">
      <span class="theme-switch__option theme-switch__option--sun" aria-hidden="true">
        <svg class="theme-switch__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v3"></path>
          <path d="M12 19v3"></path>
          <path d="m4.93 4.93 2.12 2.12"></path>
          <path d="m16.95 16.95 2.12 2.12"></path>
          <path d="M2 12h3"></path>
          <path d="M19 12h3"></path>
          <path d="m4.93 19.07 2.12-2.12"></path>
          <path d="m16.95 7.05 2.12-2.12"></path>
        </svg>
      </span>
      <span class="theme-switch__option theme-switch__option--moon" aria-hidden="true">
        <svg class="theme-switch__icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 13.2A8.7 8.7 0 0 1 10.8 3 9.5 9.5 0 1 0 21 13.2Z"></path>
        </svg>
      </span>
      <span class="theme-switch__label sr-only" id="drawerThemeLabel">Light</span>
    </button>
  </aside>

  <main class="shell">
    <section class="section section--summary" id="resources">
      <div class="section__head">
        <div>
          <p class="section-kicker" id="viewKicker">Communities</p>
        </div>
        <p class="results" id="resultsMeta"></p>
      </div>
      <div class="summary-controls">
        <label class="search search--compact">
          <span class="sr-only">Search communities</span>
          <input id="searchInput" type="search" placeholder="Search communities" />
        </label>
        <label class="search search--compact">
          <span class="sr-only">Filter by category</span>
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </label>
        <button class="category-button" id="categoriesButton" type="button">Categories</button>
      </div>
      <p class="empty-state" id="emptyState" hidden>No communities match your search or filter.</p>
    </section>

    <div class="layout">
      <aside class="section category-sidebar" aria-label="Category navigation">
        <h3>Categories</h3>
        <nav id="categoryLinks"></nav>
      </aside>
      <div class="content-column">
        <div id="resourceSections"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p>Learning Sources Hub</p>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
